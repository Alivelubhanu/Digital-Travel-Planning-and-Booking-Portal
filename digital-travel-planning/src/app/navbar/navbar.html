<nav class="navbar">

  <!-- Logo -->
  <div class="logo">
    ✈️ <span class="brand-text">TravelVista</span>
  </div>

  <!-- Navigation -->
  <ul class="nav-links">
  <li><a routerLink="/" routerLinkActive="active">Home</a></li>
  <li><a routerLink="/destinations" routerLinkActive="active">Destinations</a></li>
  <li><a routerLink="/booking" routerLinkActive="active">Book a Tour</a></li>
  <li><a routerLink="/contact" routerLinkActive="active">Contact</a></li>
</ul>

  <!-- Right Section -->
  <div class="auth-section">
    <ng-container *ngIf="!auth.isLoggedIn(); else loggedIn">
      <a routerLink="/login" class="signin-btn">Sign In</a>
      <a routerLink="/signup" class="signup-btn">Sign Up</a>
    </ng-container>
    <ng-template #loggedIn>
      <span class="welcome-text">Hello, {{ auth.getCurrentUser()?.fullName }}</span>
      <button class="signin-btn" (click)="logout()">Logout</button>
    </ng-template>
  </div>

</nav>
